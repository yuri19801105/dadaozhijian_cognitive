name: CD
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, prod]

jobs:
  build:
    name: Build Static Binary
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Mojo
        uses: modularml/setup-mojo@v1
        with:
          version: '1.0.0b2'
      - name: Build binary
        run: |
          .venv/bin/mojo build -I . -I core -o dadaozhijian main.mojo
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.REGISTRY }}/dadaozhijian
          tags: |
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy Staging
    needs: build
    if: github.event_name == 'push' || github.event.inputs.environment == 'staging'
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set image tag
        run: echo "IMAGE=${{ needs.build.outputs.image-tag }}" >> $GITHUB_ENV
      - name: Update kustomize (staging)
        run: |
          cd deploy/k8s/overlays/staging
          kustomize edit set image dadaozhijian=${{ env.IMAGE }}
      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add deploy/k8s/overlays/staging/kustomization.yaml
          git commit -m "chore: update staging image to ${{ env.IMAGE }}" || echo "no changes"
          git push

  deploy-prod:
    name: Deploy Production
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set image tag
        run: echo "IMAGE=${{ needs.build.outputs.image-tag }}" >> $GITHUB_ENV
      - name: Update kustomize (prod)
        run: |
          cd deploy/k8s/overlays/prod
          kustomize edit set image dadaozhijian=${{ env.IMAGE }}
      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add deploy/k8s/overlays/prod/kustomization.yaml
          git commit -m "chore: update prod image to ${{ env.IMAGE }}" || echo "no changes"
          git push

  # 可选：镜像签名/SBOM 生成/安全扫描
  # security-scan:
