apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../dadaozhijian.yaml

namespace: dadaozhijian-staging

namePrefix: staging-

commonLabels:
  environment: staging

replicas:
  - name: dadaozhijian
    count: 2

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: dadaozhijian
      spec:
        template:
          spec:
            containers:
              - name: app
                resources:
                  requests:
                    cpu: "500m"
                    memory: "1Gi"
                  limits:
                    cpu: "2000m"
                    memory: "4Gi"
    target:
      kind: Deployment

configMapGenerator:
  - name: dadaozhijian-config
    behavior: merge
    literals:
      - LOG_LEVEL=INFO
      - SNAPSHOT_EVERY=5