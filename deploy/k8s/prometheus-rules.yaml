apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: dadaozhijian-alerts
  namespace: dadaozhijian
  labels:
    prometheus: k8s
    app: dadaozhijian
spec:
  groups:
  - name: dadaozhijian.rules
    rules:
    # === 实例级告警 ===
    - alert: DadaozhijianDown
      expr: up{job="dadaozhijian",namespace="dadaozhijian"} == 0
      for: 1m
      labels:
        severity: critical
        team: cognitive
      annotations:
        summary: "Dadaozhijian 实例 {{ $labels.pod }} 不可用"
        description: "Pod {{ $labels.pod }} 在 namespace {{ $labels.namespace }} 已停止超过 1 分钟。"
        runbook_url: "https://github.com/your-org/dadaozhijian/blob/main/ops/runbook.md#实例down"

    - alert: DadaozhijianRestartLoop
      expr: rate(kube_pod_container_status_restarts_total{namespace="dadaozhijian",container="app"}[15m]) > 0.1
      for: 5m
      labels:
        severity: warning
        team: cognitive
      annotations:
        summary: "Dadaozhijian 频繁重启"
        description: "Pod {{ $labels.pod }} 最近 15 分钟重启率超过 0.1/min。"

    # === 业务指标告警 ===
    - alert: DadaozhijianHighDegradedRatio
      expr: |
        (
          rate(dadaozhijian_degraded_total[5m])
          /
          (rate(dadaozhijian_ok_total[5m]) + rate(dadaozhijian_degraded_total[5m]) + 1e-9)
        ) > 0.2
      for: 5m
      labels:
        severity: warning
        team: cognitive
      annotations:
        summary: "降级比例超过 20%"
        description: "当前 degraded/ok 之和中降级占比 {{ $value | humanizePercentage }}，可能 LLM Sidecar 故障或限流。"

    - alert: DadaozhijianBackfillFailureRate
      expr: (1 - dadaozhijian_backfill_success_rate) > 0.1
      for: 3m
      labels:
        severity: warning
        team: cognitive
      annotations:
        summary: "回灌失败率超过 10%"
        description: "BackfillGate 记录的成功率 {{ $value | humanizePercentage }}，BackfillSupervisor 可能被频繁拒绝。"

    - alert: DadaozhijianWuxingVarianceHigh
      expr: dadaozhijian_wuxing_variance > 0.5
      for: 10m
      labels:
        severity: info
        team: cognitive
      annotations:
        summary: "五行能量方差异常"
        description: "五行能量分布方差 {{ $value }} > 0.5，调度策略可能失衡，建议检查 liuhe 供给与 qixing 排序。"

    - alert: DadaozhijianP95LatencyHigh
      expr: |
        histogram_quantile(0.95,
          sum by (le) (rate(dadaozhijian_cycle_duration_seconds_bucket[5m]))
        ) > 1
      for: 5m
      labels:
        severity: warning
        team: cognitive
      annotations:
        summary: "P95 延迟超过 1 秒"
        description: "认知循环 P95 延迟 {{ $value }}s，热路径可能遭遇 GC/锁竞争/外部调用阻塞。"

    - alert: DadaozhijianThroughputDrop
      expr: |
        rate(dadaozhijian_throughput_total[5m]) < 0.1
      for: 10m
      labels:
        severity: warning
        team: cognitive
      annotations:
        summary: "吞吐量异常下降"
        description: "当前吞吐 {{ $value }}/s，可能无新任务输入或调度卡死。"

    # === 资源/运行时告警 ===
    - alert: DadaozhijianMemoryPressure
      expr: (dadaozhijian_memory_used_bytes / dadaozhijian_memory_budget_bytes) > 0.85
      for: 5m
      labels:
        severity: warning
        team: cognitive
      annotations:
        summary: "内存使用超过预算 85%"
        description: "MemoryBudget 使用率 {{ $value | humanizePercentage }}，可能触发 GC 或 OOM Kill。"

    - alert: DadaozhijianTaskSlotExhausted
      expr: (dadaozhijian_task_slots_used / dadaozhijian_task_slots_total) > 0.9
      for: 3m
      labels:
        severity: warning
        team: cognitive
      annotations:
        summary: "任务槽位耗尽 90%+"
        description: "并发限制器槽位使用率 {{ $value | humanizePercentage }}，新任务将排队/超时。"

    - alert: DadaozhijianJournalBacklog
      expr: dadaozhijian_journal_entries > 10000
      for: 5m
      labels:
        severity: warning
        team: cognitive
      annotations:
        summary: "WAL Journal 积压超过 10000 条"
        description: "Journal 条目 {{ $value }}，快照频率可能过低或持久化写入慢。"

    - alert: DadaozhijianSnapshotStale
      expr: time() - dadaozhijian_last_snapshot_timestamp_seconds > 300
      for: 5m
      labels:
        severity: warning
        team: cognitive
      annotations:
        summary: "快照超过 5 分钟未更新"
        description: "距上次 save_snapshot 已 {{ $value }} 秒，建议检查 snapshot_every 配置或持久化错误。"

    # === Sidecar/依赖告警 ===
    - alert: DadaozhijianNodeExporterDown
      expr: up{job="dadaozhijian",namespace="dadaozhijian",container="node-exporter"} == 0
      for: 1m
      labels:
        severity: critical
        team: cognitive
      annotations:
        summary: "Node Exporter Sidecar 不可用"
        description: "Pod {{ $labels.pod }} 的 node-exporter 容器已停止，Prometheus 无法采集指标。"

    - alert: DadaozhijianLLMSidecarDegraded
      expr: rate(dadaozhijian_connector_degraded_total[5m]) > 0.5
      for: 3m
      labels:
        severity: warning
        team: cognitive
      annotations:
        summary: "LLM Sidecar 降级频发"
        description: "Connector 降级率 {{ $value | humanizePercentage }}，可能无 API Key / 网络不通 / 配额耗尽。"